# Render blueprint: static portfolio site.
# Connect this repo in the Render dashboard (New → Static Site) and these
# settings pre-fill. Every push to main deploys automatically.
services:
  - type: web
    name: emilydenis-com
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
